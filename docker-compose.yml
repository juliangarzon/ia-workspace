version: "3.9"
services:
  workspace-monitor:
    build: .
    ports:
      - "127.0.0.1:8000:8000"   # bind to localhost only, not 0.0.0.0
    volumes:
      # Read-only state mounts — the :ro suffix is load-bearing.
      # Removing :ro from the docker socket would grant full daemon control (host root).
      - "${HOME}/.claude:/root/.claude:ro"
      - "${HOME}/.codex:/root/.codex:ro"
      - ${HOME}/.orbstack/run/docker.sock:/var/run/docker.sock:ro  # OrbStack socket (macOS)
    environment:
      - HOME=/root
    restart: unless-stopped
