<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Workspace Monitor{% endblock %}</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    header.topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand h1 {
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }

    .updated {
      font-size: 12px;
      color: var(--muted);
    }

    nav.tabs {
      display: flex;
      gap: 4px;
    }

    nav.tabs a {
      padding: 8px 16px;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      font-weight: 500;
      cursor: pointer;
    }

    nav.tabs a.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; padding-top: 24px; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 560px;
    }

    .card.unavailable { opacity: 0.7; }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    .card-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-section:last-child { border-bottom: none; }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin: 0 0 10px;
    }

    /* Quota rows */
    .quota-row {
      display: grid;
      grid-template-columns: 150px 1fr 44px 80px;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .quota-row:last-child { margin-bottom: 0; }
    .quota-label { color: var(--muted); font-size: 13px; }

    .bar {
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }
    .bar-green > span { background: var(--green); }
    .bar-yellow > span { background: var(--yellow); }
    .bar-red > span { background: var(--red); }
    .bar-neutral > span { background: var(--accent); }

    .quota-pct { text-align: right; font-variant-numeric: tabular-nums; }
    .quota-reset { text-align: right; color: var(--muted); font-size: 12px; }

    /* Activity dots */
    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--muted);
    }
    .dot-active { background: var(--green); }
    .dot-idle { background: var(--muted); }
    .dot-stale { background: #484f58; }
    .dot-thinking {
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 0 5px rgba(88, 166, 255, 0); }
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    .session, .task {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 0;
      font-size: 13px;
    }
    .session .cwd {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .session .state { width: 70px; color: var(--muted); }
    .session .branch { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .task .bullet { color: var(--muted); }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    tr:last-child td { border-bottom: none; }
    td.mono, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    td.branch { color: var(--accent); }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-green { color: var(--green); background: rgba(63, 185, 80, 0.15); }
    .badge-red { color: var(--red); background: rgba(248, 81, 73, 0.15); }
    .badge-yellow { color: var(--yellow); background: rgba(210, 153, 34, 0.15); }
    .badge-grey { color: var(--muted); background: rgba(139, 148, 158, 0.15); }

    .ab-zero { color: var(--muted); }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* Disconnected banner */
    .banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--red);
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 13px;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.25s ease;
    }
    .banner.show { transform: translateY(0); }
  </style>
</head>
<body>
  <div id="banner" class="banner">&#9888; disconnected — retrying…</div>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <h1>Workspace Monitor</h1>
        <span class="updated" id="updated"></span>
      </div>
      <nav class="tabs">
        <a data-tab="ia" href="#ia">IA</a>
        <a data-tab="docker" href="#docker">Docker</a>
        <a data-tab="projects" href="#projects">Projects</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section id="tab-ia" class="tab-panel" data-tab="ia">
      <div id="ia-content"></div>
    </section>
    <section id="tab-docker" class="tab-panel" data-tab="docker">
      <div id="docker-content"></div>
    </section>
    <section id="tab-projects" class="tab-panel" data-tab="projects">
      <div id="projects-content"></div>
    </section>
  </main>

  <script id="initial-data" type="application/json">{{ snapshot | tojson }}</script>
  <script>
    const POLL_INTERVAL = {{ poll_interval_ms }};
    const RESET_REFRESH = 30000;

    /* ---------- helpers ---------- */
    function esc(s) {
      if (s === null || s === undefined) return "";
      return String(s).replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function barClass(pct) {
      if (pct == null) return "bar-green";
      if (pct > 80) return "bar-red";
      if (pct >= 50) return "bar-yellow";
      return "bar-green";
    }

    function fmtReset(iso) {
      if (!iso) return "";
      const ms = new Date(iso).getTime() - Date.now();
      if (isNaN(ms) || ms <= 0) return "now";
      const mins = Math.round(ms / 60000);
      if (mins < 60) return mins + "m";
      const hrs = Math.round(mins / 60);
      if (hrs < 24) return hrs + "h";
      return Math.round(hrs / 24) + "d";
    }

    const WINDOW_DURATION = {
      five_hour: 5 * 3600,
      weekly: 7 * 86400,
      monthly: null // computed from resets_at (1st of next month)
    };

    function fmtDur(secs) {
      if (secs == null || isNaN(secs)) return "";
      secs = Math.max(0, Math.round(secs));
      const d = Math.floor(secs / 86400);
      const h = Math.floor((secs % 86400) / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (d > 0) return d + "d " + h + "h";
      if (h > 0) return h + "h " + m + "m";
      return m + "m";
    }

    // "3h 12m / 5h · resets 1h" — elapsed in window plus time remaining
    function fmtWindowStatus(iso, windowType) {
      if (!iso) return "";
      const resetsAt = new Date(iso);
      const secondsUntil = (resetsAt.getTime() - Date.now()) / 1000;
      if (isNaN(secondsUntil)) return "";

      let duration = WINDOW_DURATION[windowType];
      if (windowType === "monthly") {
        // resets_at is the 1st of next month; days in current window = day-of-month - 1... but it's the 1st,
        // so use the month that just ended: days in the previous month.
        const prevMonthEnd = new Date(resetsAt.getFullYear(), resetsAt.getMonth(), 0);
        duration = prevMonthEnd.getDate() * 86400;
      }
      if (duration == null) return "resets " + fmtReset(iso);

      const elapsed = duration - secondsUntil;
      const total = fmtDur(duration);
      const used = fmtDur(elapsed);
      const remaining = secondsUntil <= 0 ? "now" : fmtReset(iso);
      return used + " / " + total + " · resets " + remaining;
    }

    function fmtRelative(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      if (isNaN(ms)) return "—";
      if (ms < 0) return "now";
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return "just now";
      if (mins < 60) return mins + "m ago";
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + "h ago";
      return Math.floor(hrs / 24) + "d ago";
    }

    function fmtUptime(secs) {
      if (secs == null) return "—";
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      if (h > 0) return h + "h " + m + "m";
      if (m > 0) return m + "m";
      return secs + "s";
    }

    function fmtMem(used, limit) {
      const one = mb => mb == null ? null : (mb >= 1024 ? (mb / 1024).toFixed(1) + " GB" : Math.round(mb) + " MB");
      const u = one(used), l = one(limit);
      if (u == null && l == null) return "—";
      if (l == null) return u;
      return (u || "?") + " / " + l;
    }

    function truncate(s, n) {
      if (!s) return "";
      return s.length > n ? s.slice(0, n - 1) + "…" : s;
    }

    function fmtTokens(n) {
      if (n == null) return "—";
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
      if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
      return String(n);
    }

    /* ---------- IA tab ---------- */
    const WINDOW_LABELS = {
      five_hour: "5-hour limit",
      weekly: "Weekly · all models",
      monthly: "Monthly"
    };

    function quotaRow(label, w, windowType, monthlyUsed) {
      const pct = w && w.percent != null ? Math.round(w.percent) : null;
      let width = 0;
      let cls;
      if (pct != null) {
        width = Math.min(100, pct);
        cls = barClass(pct);
      } else if (w && monthlyUsed > 0) {
        // No absolute limit: fill relative to the monthly total
        width = Math.min(100, (w.used / monthlyUsed) * 100);
        cls = "bar-neutral";
      } else {
        cls = "bar-neutral";
      }
      const status = w ? fmtWindowStatus(w.resets_at, windowType) : "";
      return `
        <div class="quota-row">
          <span class="quota-label">${esc(label)}</span>
          <span class="bar ${cls}"><span style="width:${width}%"></span></span>
          <span class="quota-pct">${pct == null ? fmtTokens(w && w.used) : pct + "%"}</span>
          <span class="quota-reset" data-reset="${w && w.resets_at ? esc(w.resets_at) : ""}" data-window="${esc(windowType || "")}">${status}</span>
        </div>`;
    }

    function renderConnectorCard(c) {
      if (!c.available) {
        return `<div class="card unavailable">
          <div class="card-head"><span>${esc(c.label || c.connector_id)}</span>
            <span class="status-pill"><span class="dot dot-stale"></span>offline</span></div>
          <div class="card-section"><span class="quota-label">No data — source unavailable</span></div>
        </div>`;
      }

      const tw = c.token_windows;
      let quota = "";
      if (tw) {
        // When no absolute limit, normalize bars to monthly total
        const monthlyUsed = tw && tw.monthly ? tw.monthly.used : 0;
        quota = `<div class="card-section">
          ${quotaRow(WINDOW_LABELS.five_hour, tw.five_hour, "five_hour", monthlyUsed)}
          ${quotaRow(WINDOW_LABELS.weekly, tw.weekly, "weekly", monthlyUsed)}
          ${quotaRow(WINDOW_LABELS.monthly, tw.monthly, "monthly", monthlyUsed)}
        </div>`;
      } else {
        quota = `<div class="card-section"><span class="quota-label">No quota data</span></div>`;
      }

      const sessions = c.sessions || [];
      let sessionsHtml = `<div class="card-section">
        <p class="section-title">Sessions (${sessions.length})</p>`;
      if (sessions.length === 0) {
        sessionsHtml += `<span class="quota-label">No active sessions</span>`;
      } else {
        for (const s of sessions) {
          const state = s.activity_state || "idle";
          sessionsHtml += `<div class="session">
            <span class="dot dot-${esc(state)}"></span>
            <span class="state">${esc(state)}</span>
            <span class="cwd">${esc(s.cwd || "—")}</span>
            <span class="branch">${esc(s.git_branch || "")}</span>
          </div>`;
        }
      }
      sessionsHtml += `</div>`;

      const tasks = c.scheduled_tasks || [];
      let tasksHtml = "";
      if (tasks.length > 0) {
        tasksHtml = `<div class="card-section">
          <p class="section-title">Scheduled Tasks (${tasks.length})</p>`;
        for (const t of tasks) {
          tasksHtml += `<div class="task"><span class="bullet">&bull;</span> ${esc(t.name)}</div>`;
        }
        tasksHtml += `</div>`;
      }

      // overall activity dot: thinking > active > idle
      let headState = "idle";
      if (sessions.some(s => s.activity_state === "thinking")) headState = "thinking";
      else if (sessions.some(s => s.activity_state === "active")) headState = "active";
      const headLabel = headState === "thinking" ? "thinking" : headState === "active" ? "active" : "idle";

      return `<div class="card">
        <div class="card-head"><span>${esc(c.label || c.connector_id)}</span>
          <span class="status-pill"><span class="dot dot-${headState}"></span>${headLabel}</span></div>
        ${quota}
        ${sessionsHtml}
        ${tasksHtml}
      </div>`;
    }

    function renderIA(data) {
      const connectors = (data.connectors || []).filter(c => c.connector_id !== "docker");
      if (connectors.length === 0) {
        return `<div class="empty">No connectors configured</div>`;
      }
      return connectors.map(renderConnectorCard).join("");
    }

    /* ---------- Docker tab ---------- */
    function statusBadge(status) {
      const map = {
        running: "badge-green", paused: "badge-yellow",
        stopped: "badge-red", exited: "badge-red", unknown: "badge-grey"
      };
      return `<span class="badge ${map[status] || "badge-grey"}">${esc(status)}</span>`;
    }

    function renderDocker(data) {
      const rows = data.docker_containers || [];
      if (rows.length === 0) {
        return `<div class="empty">No containers — Docker unavailable</div>`;
      }
      let html = `<table><thead><tr>
        <th>Name</th><th>Image</th><th>Status</th><th>Uptime</th>
        <th>CPU%</th><th>Memory</th><th>Ports</th></tr></thead><tbody>`;
      for (const c of rows) {
        const ports = (c.ports || []).map(p => `${p.host}:${p.container}/${p.protocol}`).join(", ");
        html += `<tr>
          <td>${esc(c.name)}</td>
          <td class="mono">${esc(c.image)}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${fmtUptime(c.uptime_seconds)}</td>
          <td>${c.cpu_percent == null ? "—" : c.cpu_percent.toFixed(1)}</td>
          <td>${esc(fmtMem(c.memory_used_mb, c.memory_limit_mb))}</td>
          <td class="mono">${esc(ports || "—")}</td>
        </tr>`;
      }
      return html + `</tbody></table>`;
    }

    /* ---------- Projects tab ---------- */
    function renderProjects(data) {
      const rows = data.projects || [];
      if (rows.length === 0) {
        return `<div class="empty">No projects configured — add paths to config.json</div>`;
      }
      let html = `<table><thead><tr>
        <th>Name</th><th>Branch</th><th>Status</th><th>Ahead/Behind</th>
        <th>Last Commit</th><th>Last Activity</th></tr></thead><tbody>`;
      for (const p of rows) {
        const status = p.dirty
          ? `<span class="badge badge-yellow">dirty &bull;</span>`
          : `<span class="badge badge-green">clean</span>`;
        const ahead = p.ahead || 0, behind = p.behind || 0;
        const abCls = (ahead === 0 && behind === 0) ? "ab-zero" : "";
        const ab = `<span class="${abCls}">&uarr;${ahead} &darr;${behind}</span>`;
        const commit = p.last_commit_message
          ? `${esc(truncate(p.last_commit_message, 40))} <span class="ab-zero">${fmtRelative(p.last_commit_at)}</span>`
          : "—";
        html += `<tr>
          <td>${esc(p.name)}</td>
          <td class="mono branch">${esc(p.branch || "—")}</td>
          <td>${status}</td>
          <td class="mono">${ab}</td>
          <td>${commit}</td>
          <td>${fmtRelative(p.last_activity_at)}</td>
        </tr>`;
      }
      return html + `</tbody></table>`;
    }

    /* ---------- render + poll ---------- */
    function render(data) {
      document.getElementById("ia-content").innerHTML = renderIA(data);
      document.getElementById("docker-content").innerHTML = renderDocker(data);
      document.getElementById("projects-content").innerHTML = renderProjects(data);
      const cap = data.captured_at ? new Date(data.captured_at).toLocaleTimeString() : "";
      document.getElementById("updated").textContent = cap ? "updated " + cap : "";
    }

    function refreshResets() {
      document.querySelectorAll("[data-reset]").forEach(el => {
        const iso = el.getAttribute("data-reset");
        const windowType = el.getAttribute("data-window");
        el.textContent = fmtWindowStatus(iso, windowType);
      });
    }

    /* ---------- tabs ---------- */
    function activateTab(name) {
      const valid = ["ia", "docker", "projects"];
      if (!valid.includes(name)) name = "ia";
      document.querySelectorAll("nav.tabs a").forEach(a =>
        a.classList.toggle("active", a.dataset.tab === name));
      document.querySelectorAll(".tab-panel").forEach(p =>
        p.classList.toggle("active", p.dataset.tab === name));
    }

    function tabFromHash() {
      return (location.hash || "#ia").replace("#", "");
    }

    window.addEventListener("hashchange", () => activateTab(tabFromHash()));

    const banner = document.getElementById("banner");
    async function poll() {
      try {
        const res = await fetch("/api/snapshot", { cache: "no-store" });
        if (!res.ok) throw new Error("bad status " + res.status);
        const data = await res.json();
        render(data);
        banner.classList.remove("show");
      } catch (e) {
        banner.classList.add("show");
      }
    }

    /* ---------- boot ---------- */
    (function boot() {
      let initial = {};
      try {
        initial = JSON.parse(document.getElementById("initial-data").textContent || "{}");
      } catch (e) { initial = {}; }
      render(initial);
      activateTab(tabFromHash());
      setInterval(poll, POLL_INTERVAL);
      setInterval(refreshResets, RESET_REFRESH);
    })();
  </script>
</body>
</html>
